<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prague Dashboard - EKS Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #333;
        }
        
        .container {
            max-width: 1200px;
            width: 100%;
        }
        
        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        
        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .subtitle {
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
            margin-bottom: 30px;
        }
        
        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }
        
        .card-header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }
        
        .card-icon {
            font-size: 2.5em;
            margin-right: 15px;
        }
        
        .card-title {
            font-size: 1.5em;
            font-weight: 600;
            color: #667eea;
        }
        
        .weather-main {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 20px 0;
        }
        
        .temperature {
            font-size: 4em;
            font-weight: bold;
            color: #667eea;
        }
        
        .weather-icon {
            font-size: 5em;
        }
        
        .weather-details {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 20px;
        }
        
        .detail-item {
            display: flex;
            align-items: center;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 10px;
        }
        
        .detail-icon {
            font-size: 1.5em;
            margin-right: 10px;
        }
        
        .detail-label {
            font-size: 0.9em;
            color: #666;
        }
        
        .detail-value {
            font-weight: 600;
            color: #333;
        }
        
        .exchange-rate {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 20px;
        }
        
        .rate-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .rate-label {
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        .rate-value {
            font-size: 2em;
            font-weight: bold;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        
        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
        }
        
        .mock-badge {
            display: inline-block;
            background: #ffc107;
            color: #333;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.8em;
            margin-left: 10px;
        }
        
        footer {
            text-align: center;
            color: white;
            margin-top: 40px;
            opacity: 0.8;
        }
        
        .refresh-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }
        
        .refresh-btn:hover {
            background: #764ba2;
            transform: scale(1.05);
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .spinning {
            animation: spin 1s linear infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🇨🇿 Prague Dashboard</h1>
            <p class="subtitle">Live Weather & Currency Exchange</p>
            <p style="font-size: 0.9em; margin-top: 10px;">Deployed on AWS EKS with ArgoCD GitOps</p>
        </header>
        
        <div class="dashboard">
            <!-- Weather Card -->
            <div class="card">
                <div class="card-header">
                    <span class="card-icon">🌤️</span>
                    <h2 class="card-title">Prague Weather</h2>
                </div>
                <div id="weather-content" class="loading">
                    <p>Loading weather data...</p>
                </div>
            </div>
            
            <!-- Exchange Rate Card -->
            <div class="card">
                <div class="card-header">
                    <span class="card-icon">💱</span>
                    <h2 class="card-title">CZK ↔ EUR Exchange</h2>
                </div>
                <div id="exchange-content" class="loading">
                    <p>Loading exchange rates...</p>
                </div>
            </div>
        </div>
        
        <div style="text-align: center;">
            <button class="refresh-btn" onclick="loadData()">
                <span id="refresh-icon">🔄</span> Refresh Data
            </button>
        </div>
        
        <footer>
            <p>Demo Application v1.1.0 | GitOps Managed by ArgoCD</p>
            <p style="font-size: 0.9em; margin-top: 5px;">Updated: <span id="update-time"></span></p>
        </footer>
    </div>
    
    <script>
        function updateTime() {
            document.getElementById('update-time').textContent = new Date().toLocaleString();
        }
        
        async function loadWeather() {
            try {
                const response = await fetch('/api/weather');
                const data = await response.json();
                
                const mockBadge = data.mock ? '<span class="mock-badge">Demo Data</span>' : '';
                
                document.getElementById('weather-content').innerHTML = `
                    <div class="weather-main">
                        <div>
                            <div class="temperature">${data.temperature}°C</div>
                            <div style="font-size: 1.2em; color: #666; margin-top: 10px;">
                                ${data.description} ${mockBadge}
                            </div>
                        </div>
                        <div class="weather-icon">
                            <img src="https://openweathermap.org/img/wn/${data.icon}@2x.png" 
                                 alt="Weather" style="width: 100px; height: 100px;">
                        </div>
                    </div>
                    <div class="weather-details">
                        <div class="detail-item">
                            <span class="detail-icon">🌡️</span>
                            <div>
                                <div class="detail-label">Feels Like</div>
                                <div class="detail-value">${data.feels_like}°C</div>
                            </div>
                        </div>
                        <div class="detail-item">
                            <span class="detail-icon">💧</span>
                            <div>
                                <div class="detail-label">Humidity</div>
                                <div class="detail-value">${data.humidity}%</div>
                            </div>
                        </div>
                        <div class="detail-item">
                            <span class="detail-icon">💨</span>
                            <div>
                                <div class="detail-label">Wind Speed</div>
                                <div class="detail-value">${data.wind_speed} m/s</div>
                            </div>
                        </div>
                        <div class="detail-item">
                            <span class="detail-icon">📍</span>
                            <div>
                                <div class="detail-label">Location</div>
                                <div class="detail-value">Prague, CZ</div>
                            </div>
                        </div>
                    </div>
                `;
            } catch (error) {
                document.getElementById('weather-content').innerHTML = 
                    '<div class="error">Failed to load weather data</div>';
            }
        }
        
        async function loadExchange() {
            try {
                const response = await fetch('/api/exchange');
                const data = await response.json();
                
                const mockBadge = data.mock ? '<span class="mock-badge">Demo Data</span>' : '';
                
                document.getElementById('exchange-content').innerHTML = `
                    <div class="exchange-rate">
                        <div class="rate-box">
                            <div>
                                <div class="rate-label">1 EUR =</div>
                                <div class="rate-value">${data.eur_to_czk} CZK</div>
                            </div>
                            <div style="font-size: 3em;">🇪🇺→🇨🇿</div>
                        </div>
                        <div class="rate-box">
                            <div>
                                <div class="rate-label">1 CZK =</div>
                                <div class="rate-value">${data.czk_to_eur} EUR</div>
                            </div>
                            <div style="font-size: 3em;">🇨🇿→🇪🇺</div>
                        </div>
                        <div style="text-align: center; color: #666; margin-top: 10px;">
                            Last updated: ${data.last_updated} ${mockBadge}
                        </div>
                    </div>
                `;
            } catch (error) {
                document.getElementById('exchange-content').innerHTML = 
                    '<div class="error">Failed to load exchange rates</div>';
            }
        }
        
        async function loadData() {
            const icon = document.getElementById('refresh-icon');
            icon.classList.add('spinning');
            
            await Promise.all([loadWeather(), loadExchange()]);
            updateTime();
            
            setTimeout(() => icon.classList.remove('spinning'), 1000);
        }
        
        // Load data on page load
        loadData();
        
        // Auto-refresh every 5 minutes
        setInterval(loadData, 300000);
    </script>
</body>
</html>
