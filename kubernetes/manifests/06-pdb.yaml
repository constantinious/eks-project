---
# ------------------------------------------------------------------------------
# Pod Disruption Budget
# Ensures minimum availability during voluntary disruptions
# (e.g., node drains, cluster upgrades)
# ------------------------------------------------------------------------------
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: demo-app
  namespace: demo-app
  labels:
    app.kubernetes.io/name: demo-app
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: demo-app
