# ------------------------------------------------------------------------------
# ServiceMonitor for Application Workloads
# Automatically discovers and scrapes any service with the appropriate labels
# in any namespace. Applications must expose /metrics endpoint on port "metrics".
# ------------------------------------------------------------------------------
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: application-metrics
  namespace: monitoring
  labels:
    app.kubernetes.io/managed-by: kubernetes-manifests
    release: kube-prometheus-stack
spec:
  # Scrape from any namespace
  namespaceSelector:
    any: true
  # Match services with this label
  selector:
    matchLabels:
      prometheus.io/scrape: "true"
  endpoints:
    - port: metrics
      interval: 30s
      scrapeTimeout: 10s
      path: /metrics
      honorLabels: true
      relabelings:
        - sourceLabels: [__meta_kubernetes_namespace]
          targetLabel: namespace
        - sourceLabels: [__meta_kubernetes_service_name]
          targetLabel: service
        - sourceLabels: [__meta_kubernetes_pod_name]
          targetLabel: pod
