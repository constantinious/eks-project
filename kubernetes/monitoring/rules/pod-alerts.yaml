# ------------------------------------------------------------------------------
# PrometheusRule - Pod & Container Alerts
# Monitors pod lifecycle events (restarts, OOMKill) and resource usage.
# ------------------------------------------------------------------------------
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: pod-alerts
  namespace: monitoring
  labels:
    app.kubernetes.io/managed-by: kubernetes-manifests
    release: kube-prometheus-stack
spec:
  groups:
    - name: pod.rules
      rules:
        # --- Frequent Restarts ---
        - alert: PodFrequentRestarts
          expr: |
            increase(kube_pod_container_status_restarts_total[1h]) > 5
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is restarting frequently"
            description: "Container {{ $labels.container }} in pod {{ $labels.namespace }}/{{ $labels.pod }} has restarted {{ $value | printf \"%.0f\" }} times in the last hour."

        # --- OOMKilled ---
        - alert: PodOOMKilled
          expr: |
            kube_pod_container_status_last_terminated_reason{reason="OOMKilled"} == 1
          for: 0m
          labels:
            severity: critical
          annotations:
            summary: "Container OOMKilled: {{ $labels.namespace }}/{{ $labels.pod }}"
            description: "Container {{ $labels.container }} in pod {{ $labels.namespace }}/{{ $labels.pod }} was OOMKilled. Consider increasing memory limits."

        # --- CrashLoopBackOff ---
        - alert: PodCrashLoopBackOff
          expr: |
            max_over_time(kube_pod_container_status_waiting_reason{reason="CrashLoopBackOff"}[5m]) >= 1
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "CrashLoopBackOff: {{ $labels.namespace }}/{{ $labels.pod }}"
            description: "Container {{ $labels.container }} in pod {{ $labels.namespace }}/{{ $labels.pod }} is in CrashLoopBackOff."

        # --- Pending Pod ---
        - alert: PodStuckPending
          expr: |
            kube_pod_status_phase{phase="Pending"} == 1
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Pod stuck in Pending: {{ $labels.namespace }}/{{ $labels.pod }}"
            description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} has been in Pending state for more than 15 minutes. Check resource requests and node capacity."

        # --- Container CPU Throttling ---
        - alert: ContainerCpuThrottlingHigh
          expr: |
            sum by(namespace, pod, container) (
              rate(container_cpu_cfs_throttled_periods_total[5m])
            ) /
            sum by(namespace, pod, container) (
              rate(container_cpu_cfs_periods_total[5m])
            ) > 0.5
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "High CPU throttling for {{ $labels.namespace }}/{{ $labels.pod }}/{{ $labels.container }}"
            description: "Container {{ $labels.container }} in {{ $labels.namespace }}/{{ $labels.pod }} is being throttled {{ $value | printf \"%.0f\" }}% of the time. Consider increasing CPU limits."
