# ------------------------------------------------------------------------------
# PrometheusRule - Cluster-Level Alerts
# Monitors HPA saturation, PVC usage, certificate expiry, and cluster health.
# ------------------------------------------------------------------------------
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: cluster-alerts
  namespace: monitoring
  labels:
    app.kubernetes.io/managed-by: kubernetes-manifests
    release: kube-prometheus-stack
spec:
  groups:
    - name: cluster.rules
      rules:
        # --- HPA at Max Replicas ---
        - alert: HPAAtMaxReplicas
          expr: |
            kube_horizontalpodautoscaler_status_current_replicas == kube_horizontalpodautoscaler_spec_max_replicas
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "HPA {{ $labels.namespace }}/{{ $labels.horizontalpodautoscaler }} at max replicas"
            description: "HPA {{ $labels.horizontalpodautoscaler }} in namespace {{ $labels.namespace }} has been at max replicas ({{ $value }}) for more than 15 minutes. Consider increasing max replicas or optimising the workload."

        # --- PVC Usage High ---
        - alert: PersistentVolumeUsageHigh
          expr: |
            (kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes) * 100 > 85
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "PVC {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} usage above 85%"
            description: "PVC {{ $labels.persistentvolumeclaim }} in namespace {{ $labels.namespace }} is {{ $value | printf \"%.1f\" }}% full."

        - alert: PersistentVolumeUsageCritical
          expr: |
            (kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes) * 100 > 95
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "PVC {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} usage critical"
            description: "PVC {{ $labels.persistentvolumeclaim }} in namespace {{ $labels.namespace }} is {{ $value | printf \"%.1f\" }}% full. Immediate expansion required."

        # --- Certificate Expiry ---
        - alert: CertificateExpiringSoon
          expr: |
            (certmanager_certificate_expiration_timestamp_seconds - time()) / 86400 < 7
          for: 1h
          labels:
            severity: warning
          annotations:
            summary: "Certificate {{ $labels.namespace }}/{{ $labels.name }} expiring soon"
            description: "Certificate {{ $labels.name }} in namespace {{ $labels.namespace }} expires in {{ $value | printf \"%.0f\" }} days."

        # --- Deployment Replicas Mismatch ---
        - alert: DeploymentReplicasMismatch
          expr: |
            kube_deployment_spec_replicas != kube_deployment_status_ready_replicas
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Deployment {{ $labels.namespace }}/{{ $labels.deployment }} replicas mismatch"
            description: "Deployment {{ $labels.deployment }} has {{ $value }} desired replicas but not all are ready for more than 10 minutes."

        # --- StatefulSet Replicas Mismatch ---
        - alert: StatefulSetReplicasMismatch
          expr: |
            kube_statefulset_status_replicas_ready != kube_statefulset_status_replicas
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "StatefulSet {{ $labels.namespace }}/{{ $labels.statefulset }} replicas mismatch"
            description: "StatefulSet {{ $labels.statefulset }} has not all replicas ready for more than 10 minutes."

        # --- DaemonSet Not Scheduled ---
        - alert: DaemonSetMisscheduled
          expr: |
            kube_daemonset_status_desired_number_scheduled - kube_daemonset_status_current_number_scheduled > 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "DaemonSet {{ $labels.namespace }}/{{ $labels.daemonset }} has unscheduled pods"
            description: "DaemonSet {{ $labels.daemonset }} has {{ $value }} pods that are not scheduled."

        # --- Kubernetes API Server Error Rate ---
        - alert: KubernetesApiServerErrorsHigh
          expr: |
            sum(rate(apiserver_request_total{code=~"5.."}[5m])) /
            sum(rate(apiserver_request_total[5m])) * 100 > 3
          for: 10m
          labels:
            severity: critical
          annotations:
            summary: "Kubernetes API server error rate is high"
            description: "Kubernetes API server is returning {{ $value | printf \"%.1f\" }}% 5xx errors."
