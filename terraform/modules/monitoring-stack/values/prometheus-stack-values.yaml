# ------------------------------------------------------------------------------
# kube-prometheus-stack Helm Values
# Prometheus + Grafana + AlertManager configuration
# ------------------------------------------------------------------------------

# --- Global ---
fullnameOverride: "kube-prometheus-stack"

# --- Prometheus ---
prometheus:
  prometheusSpec:
    retention: ${prometheus_retention}
    retentionSize: "45GB"

    resources:
      requests:
        cpu: "500m"
        memory: "1Gi"
      limits:
        cpu: "2000m"
        memory: "4Gi"

    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: "${storage_class}"
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: "${prometheus_pvc_size}"

    # Service discovery - scrape all ServiceMonitors
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false

    # Enable remote write for optional Cortex/Thanos
    # remoteWrite: []

  service:
    type: ClusterIP

# --- Grafana ---
grafana:
  enabled: true

  adminPassword: "${grafana_admin_password}"

  persistence:
    enabled: true
    storageClassName: "${storage_class}"
    size: "${grafana_pvc_size}"

  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

  # Datasources - Prometheus is auto-configured, add Loki and Tempo
  additionalDataSources:
    - name: Loki
      type: loki
      url: "${loki_url}"
      access: proxy
      isDefault: false
      jsonData:
        maxLines: 1000
        derivedFields:
          - datasourceUid: tempo
            matcherRegex: "trace_id=(\\w+)"
            name: TraceID
            url: "$$${__value.raw}"

    - name: Tempo
      type: tempo
      uid: tempo
      url: "${tempo_url}"
      access: proxy
      isDefault: false
      jsonData:
        tracesToLogs:
          datasourceUid: loki
          filterByTraceID: true
          filterBySpanID: false
        serviceMap:
          datasourceUid: prometheus
        nodeGraph:
          enabled: true

  # Pre-built dashboards
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: "default"
          orgId: 1
          folder: ""
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/default

  dashboards:
    default:
      kubernetes-cluster:
        gnetId: 7249
        revision: 1
        datasource: Prometheus
      kubernetes-pods:
        gnetId: 6417
        revision: 1
        datasource: Prometheus
      node-exporter-full:
        gnetId: 1860
        revision: 37
        datasource: Prometheus
      kubernetes-api-server:
        gnetId: 12006
        revision: 1
        datasource: Prometheus
      prometheus-stats:
        gnetId: 2
        revision: 2
        datasource: Prometheus

  sidecar:
    dashboards:
      enabled: true
      searchNamespace: ALL
    datasources:
      enabled: true

  service:
    type: ClusterIP

# --- AlertManager ---
alertmanager:
  enabled: true

  alertmanagerSpec:
    resources:
      requests:
        cpu: "50m"
        memory: "64Mi"
      limits:
        cpu: "200m"
        memory: "256Mi"

    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: "${storage_class}"
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: "5Gi"

  config:
    global:
      resolve_timeout: 5m

    route:
      group_by: ["alertname", "namespace"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: "null"

      routes:
        - receiver: "critical"
          match:
            severity: critical
          repeat_interval: 1h

        - receiver: "warning"
          match:
            severity: warning
          repeat_interval: 4h

    receivers:
      - name: "null"
      - name: "critical"
        # Configure Slack/Email/PagerDuty here
        # slack_configs:
        #   - channel: "#alerts-critical"
        #     send_resolved: true
      - name: "warning"
        # Configure Slack/Email here

    inhibit_rules:
      - source_match:
          severity: critical
        target_match:
          severity: warning
        equal: ["alertname", "namespace"]

# --- Node Exporter ---
nodeExporter:
  enabled: true

  resources:
    requests:
      cpu: "50m"
      memory: "32Mi"
    limits:
      cpu: "200m"
      memory: "64Mi"

# --- kube-state-metrics ---
kubeStateMetrics:
  enabled: true

# --- Default PrometheusRules ---
defaultRules:
  create: true
  rules:
    alertmanager: true
    etcd: false  # Managed by AWS
    configReloaders: true
    general: true
    k8s: true
    kubeApiserverAvailability: true
    kubeApiserverBurnrate: true
    kubeApiserverHistogram: true
    kubeApiserverSlos: true
    kubeControllerManager: false  # Managed by AWS
    kubelet: true
    kubeProxy: false  # Managed by AWS
    kubePrometheusGeneral: true
    kubePrometheusNodeRecording: true
    kubernetesApps: true
    kubernetesResources: true
    kubernetesStorage: true
    kubernetesSystem: true
    kubeScheduler: false  # Managed by AWS
    kubeStateMetrics: true
    network: true
    node: true
    nodeExporterAlerting: true
    nodeExporterRecording: true
    prometheus: true
    prometheusOperator: true
