# ------------------------------------------------------------------------------
# Promtail Helm Values
# DaemonSet log collector - ships logs from all nodes to Loki
# ------------------------------------------------------------------------------

config:
  clients:
    - url: "${loki_url}/loki/api/v1/push"
      tenant_id: ""
      batchwait: 1s
      batchsize: 1048576  # 1MB
      timeout: 10s

  snippets:
    # Parse JSON logs automatically
    pipelineStages:
      - cri: {}
      - json:
          expressions:
            level: level
            msg: msg
            trace_id: trace_id
      - labels:
          level:
          trace_id:

# --- Resources ---
resources:
  requests:
    cpu: "50m"
    memory: "64Mi"
  limits:
    cpu: "200m"
    memory: "128Mi"

# --- Tolerations to run on all nodes ---
tolerations:
  - effect: NoSchedule
    operator: Exists
  - effect: NoExecute
    operator: Exists

# --- Service discovery ---
serviceMonitor:
  enabled: true
  labels:
    release: kube-prometheus-stack
